<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XBZ Prime TV | Live Football</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e27">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast-container"></div>

    <div id="sidebar-overlay" class="overlay"></div>

    <aside id="sidebar" class="brutal-box">
        <div class="sidebar-header">
            <h2>Categories</h2>
            <button id="close-sidebar" class="icon-btn"><i class="fas fa-times"></i></button>
        </div>
        <nav id="category-nav">
            <button class="cat-btn active" data-cat="Home"><i class="fas fa-home"></i> Home</button>
            <button class="cat-btn" data-cat="Live Now"><i class="fas fa-fire"></i> Live Now</button>
            <button class="cat-btn" data-cat="FIFA"><i class="fas fa-trophy"></i> FIFA</button>
            <button class="cat-btn" data-cat="beIN Sports"><i class="fas fa-tv"></i> beIN Sports</button>
        </nav>
    </aside>

    <main id="app-container">
        <header class="brutal-box">
            <div class="header-left">
                <button id="hamburger" class="icon-btn"><i class="fas fa-bars"></i></button>
                <h1 class="logo">⚽ XBZ Prime</h1>
                <div class="live-indicator"><span class="pulse"></span> <span id="live-count">0</span> LIVE</div>
            </div>
            <div class="header-right">
                <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon"></i></button>
                <button id="refresh-btn" class="icon-btn"><i class="fas fa-sync-alt"></i></button>
            </div>
        </header>

        <div class="ticker-wrap brutal-box">
            <div class="ticker-move" id="score-ticker">
                <div class="ticker-item">Loading live scores...</div>
            </div>
        </div>

        <section id="player-section" class="brutal-box">
            <div class="player-wrapper">
                <video id="xbz-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="100%" height="100%">
                    <p class="vjs-no-js">To view this video please enable JavaScript.</p>
                </video>
                <div id="player-watermark">XBZ Live TV</div>
            </div>
            <div class="player-controls brutal-box">
                <input type="text" id="custom-url" placeholder="Paste direct URL or M3U8 here..." class="brutal-input">
                <button id="play-custom" class="brutal-btn"><i class="fas fa-play"></i> Play</button>
            </div>
        </section>

        <div class="grid-layout">
            <section id="matches-section">
                <h2 class="section-title">Live & Upcoming Matches</h2>
                <div id="match-grid" class="match-grid">
                    </div>
            </section>

            <section id="channels-section">
                <h2 class="section-title">Available Channels</h2>
                <div id="channel-list" class="channel-list">
                    </div>
            </section>
        </div>
    </main>

    <nav id="bottom-nav" class="brutal-box">
        <button class="nav-item active"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-item"><i class="fas fa-futbol"></i><span>Matches</span></button>
        <button class="nav-item"><i class="fas fa-tv"></i><span>Channels</span></button>
    </nav>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-hls/5.15.0/videojs-contrib-hls.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
